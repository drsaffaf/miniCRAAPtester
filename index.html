<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAAP Tester</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Exo+2:wght@500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="main-container">

  
<!-- TITLE OF PAGE-->
<h1>CRAAP Tester</h1>


  
<!-- CONTAINER ONE -->
<div class="container">
  <h2>Research Topic</h2>

 <!-- KEYWORDS -->
<div class="row">
  <label>Keywords</label>
  <input type="text" id="keywords">
</div>

 <!-- SYNONYMS -->
<div class="row">
  <label>Keyword Synonyms</label>
  <input type="text" id="synonyms">
</div>

  <!-- TOPIC FIELD -->
<div class="row">
  <label>Field</label>
  <select id="topicField">
    <option>Select Field</option>
    <option>Health & Medical Sciences</option>
    <option>Physical Sciences (Physics, Chemistry)</option>
    <option>Engineering & Technology (Computer Science)</option>
    <option>Social Sciences (Psychology, Economics, Political Science, Anthropology)</option>
    <option>Humanities (History, Philosophy, Literature, Religion)</option>
    <option>Other</option>
  </select>
</div>
</div>
  
<!-- END OF CONTAINER ONE-->

  
<!-- CONTAINER TWO -->
<div class="container">
  <h2>Source</h2>

  <!-- PUBLICATION DATE -->
  <div class="row date-row">
    <label>Publication Date</label>
    <input type="date" id="pubDate">
    <label class="checkbox-label">
      <input type="checkbox" onclick="toggleDate()"> No date provided
    </label>
  </div>

  <!-- PUBLISHER NAME -->

  <div class="row">
  <label>Publisher Reputation</label>
  <select>
    <option>Select Publisher Reputation</option>
      <option>Highly reputable (peer-reviewed, established institutions)</option>
      <option>Generally reputable (well-known organizations, edited content)</option>
      <option>Mixed reputation (quality varies, may contain bias)</option>
      <option>Low reputation (little oversight, unverified content)</option>
      <option>Unknown / Unclear</option>
  </select>  
  </div>

  <!-- PUBLISHER TYPE -->
  <div class="row">
  <label>Publication Type</label>
  <select>
    <option>Select Publication Type</option>
     <option>Scholarly Journals</option>
     <option>Academic & Research Sources (Conferences, White Papers)</option>
     <option>Government & International Organizations</option>
     <option>News & Journalism (Newspapers, Magazines, Investigative, Financial)</option>
     <option>Documentary</option>
     <option>Corporate & Marketing Content (Branded Media, Ads)</option>
     <option>Online & User-Generated Content (Blogs, Social Media, Podcasts)</option>
     <option>Legal / Court Documents</option>
     <option>Other</option>
  </select>
  </div>


<div class="row">
  <label>Field of Publication</label>
  <select id="sourceField">
    <option>Select Field</option>
    <option>Health & Medical Sciences</option>
    <option>Physical Sciences (Physics, Chemistry)</option>
    <option>Engineering & Technology (Computer Science)</option>
    <option>Social Sciences (Psychology, Economics, Political Science, Anthropology)</option>
    <option>Humanities (History, Philosophy, Literature, Religion)</option>
    <option>Other</option>
  </select>
</div>
  
<div class="row">
  <label>Evidence Provided</label>
  <select id="evidence">
    <option>Select the Evidence Provided</option>
    <option>Full citations/links provided</option>
    <option>Some citations/ links provided</option>
    <option>One citation/ link provided</option>
    <option>No citations/ links provided</option>
  </select>
</div>

  
  <label>Additional Information (select all that apply):</label>
  <div class="checkbox-group">
    <label><input type="checkbox"> Advertising present</label>
    <label><input type="checkbox"> Sponsored</label>
    <label><input type="checkbox"> Promotes a product or agenda</label>
    <label><input type="checkbox"> Uses emotional or persuasive language</label>
    <label><input type="checkbox"> Presents a one-sided argument</label>
  </div>
</div>


<!-- AUTHORS -->
<div class="container">
  <h2>Authors</h2>

  <div id="authors"></div>

  <div class="author-buttons">
    <button type="button" onclick="addAuthor()">Add Author</button>
    <button type="button" onclick="removeAuthor()">Remove Author</button>
  </div>
</div>
  
  <!-- FULL TEXT -->
<div class="container">
  <h2>Full Source Text or Transcript</h2> 
  <div class="row full">
<textarea id="sourceText"></textarea>
  </div>
</div>

</div>
</div>

<div class="container">
  <h2>CRAAP Evaluation</h2>

  <button onclick="runCRAAP()">Evaluate Source</button>

  <div id="results"></div>
</div>
  
<script>

let authorCount = 0;

/* DEGREE DROPDOWN */
function degreeDropdown() {
  return `
    <select>
      <option>Highest Degree</option>
      <option>Doctorate (PhD, MD, etc)</option>
      <option>Masters</option>
      <option>Bachelors</option>
      <option>High School</option>
      <option>No degree listed</option>
    </select>
  `;
}

/* FIELD DROPDOWN */
function fieldSelect() {
  return `
    <select>
      <option>Degree Field</option>
      <option>Health & Medical Sciences</option>
      <option>Physical Sciences</option>
      <option>Engineering & Technology</option>
      <option>Social Sciences</option>
      <option>Humanities</option>
      <option>Other</option>
      <option>Unknown</option>
    </select>
  `;
}

/* ADD AUTHOR */
function addAuthor() {
  authorCount++;

  const div = document.createElement('div');
  div.className = 'author-row';

  div.innerHTML = `
    <label>Author ${authorCount}</label>
    <input type="text" placeholder="Name">
    ${degreeDropdown()}
    ${fieldSelect()}
  `;

  document.getElementById('authors').appendChild(div);
}

/* REMOVE AUTHOR */
function removeAuthor() {
  const container = document.getElementById('authors');
  if (container.children.length > 0) {
    container.removeChild(container.lastChild);
    authorCount--;
  }
}

/* START WITH ONE AUTHOR */
addAuthor();

function runCRAAP() {

  /* ========= GET VALUES ========= */

  const topicField = document.getElementById('topicField').value.toLowerCase();

  const keywords = document.getElementById('keywords').value
    .toLowerCase()
    .split(',')
    .map(t => t.trim())
    .filter(t => t);

  const synonyms = document.getElementById('synonyms').value
    .toLowerCase()
    .split(',')
    .map(t => t.trim())
    .filter(t => t);

  const text = document.getElementById('sourceText').value.toLowerCase();

  const sourceField = document.getElementById('sourceField').value.toLowerCase();

  const evidence = document.getElementById('evidence').value;

  const checks = document.querySelectorAll('.checkbox-group input:checked');
  const authorRows = document.querySelectorAll('.author-row');


  /* ========= 1. CURRENCY ========= */

  let currency = 3;

  if (topicField.includes("health") || topicField.includes("technology")) {
    currency = 5;
  } 
  else if (topicField.includes("science")) {
    currency = 4;
  }


  /* ========= 2. RELEVANCE ========= */

  let matchCount = 0;
  let allTerms = [...keywords, ...synonyms];

  allTerms.forEach(term => {
    if (text.includes(term)) {
      matchCount++;
    }
  });

  let relevance = Math.min(5, matchCount);


  /* ========= 3. AUTHORITY ========= */

  let authority = 0;

  authorRows.forEach(row => {
    const selects = row.querySelectorAll('select');

    let degree = selects[0].value;
    let field = selects[1].value.toLowerCase();

    if (field === sourceField) {
      authority += 2;
    }

    if (sourceField.includes("health") && degree.includes("Doctorate")) {
      authority += 3;
    } 
    else if (sourceField.includes("journalism") && degree.includes("Bachelors")) {
      authority += 2;
    } 
    else if (degree.includes("Masters")) {
      authority += 2;
    }
  });

  authority = Math.min(5, authority);


  /* ========= 4. PURPOSE ========= */

  let purpose = 5 - checks.length;
  if (purpose < 1) purpose = 1;


  /* ========= 5. ACCURACY ========= */

  let accuracy = 3;

  if (evidence.includes("Full")) accuracy = 5;
  else if (evidence.includes("Some")) accuracy = 4;
  else if (evidence.includes("One")) accuracy = 2;
  else if (evidence.includes("No")) accuracy = 1;


  /* ========= TOTAL ========= */

  let total = currency + relevance + authority + purpose + accuracy;


  /* ========= FEEDBACK ========= */

  let message = "";

  if (total >= 22) {
    message = "✅ Strong source – highly credible and relevant.";
  } else if (total >= 16) {
    message = "⚠️ Moderate source – use with caution.";
    } else {
    message = "❌ Weak source – not recommended.";
  }


  /* ========= OUTPUT ========= */

  document.getElementById("results").innerHTML = `
    <p><strong>Currency:</strong> ${currency}/5</p>
    <p><strong>Relevance:</strong> ${relevance}/5</p>
    <p><strong>Authority:</strong> ${authority}/5</p>
    <p><strong>Purpose:</strong> ${purpose}/5</p>
    <p><strong>Accuracy:</strong> ${accuracy}/5</p>
    <hr>
    <h3>Total Score: ${total} / 25</h3>
    <p>${message}</p>
  `;
}

</script>
