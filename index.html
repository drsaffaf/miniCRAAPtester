<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAAP Tester</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Exo+2:wght@500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="main-container">

<!-- TITLE OF PAGE-->

<h1>CRAAP Tester</h1>

<!-- YOUR TOPIC -->
<div class="container">
  <h2>Your Topic</h2>

  <div class="row">
    <label>Keywords</label>
    <input type="text">
  </div>

  <div class="row">
    <label>Keyword Synonyms</label>
    <input type="text">
  </div>

  <div class="row">
    <label>Field</label>
    <select>
    <option>Select Field</option>
    <option>Health & Medical Sciences</option>
    <option>Physical Sciences (Physics, Chemistry)</option>
    <option>Engineering & Technology (Computer Science)</option>
    <option>Social Sciences (Psychology, Economics, Political Science, Anthropology)</option>
    <option>Humanities (History, Philosophy, Literature, Religion)</option>
    <option>Other</option>
    </select>
  </div>
</div>

<!-- YOUR ARICLE -->
<div class="container">
  <h2>Article</h2>

  <div class="row">
    <label>Full Title</label>
    <input type="text">
  </div>

  <div class="row date-row">
    <label>Publication Date</label>
    <input type="date" id="pubDate">
    <label class="checkbox-label">
      <input type="checkbox" onclick="toggleDate()"> No date provided
    </label>
  </div>

    <div class="row">
      <label for="authority">Quality check:</label>
<label>Check for any of the following:</label>
<label><input type="checkbox"> Advertising present</label>
<label><input type="checkbox"> Sponsored content</label>
<label><input type="checkbox"> Promotes a product or agenda</label>
<label><input type="checkbox"> Emotional or persuasive language</label>
<label><input type="checkbox"> One-sided argument</label>
  </div>
  

  
</div>

  <!-- PUBLISHER -->
<div class="container">
  <h2>Publisher</h2>
  <div class="row">
  <label>Publisher Name</label>
  <input type="text" class="publisher-input">
  </div>

  <div class="row">
  <label>Publication Type</label>
  <select>
    <option>Select Publication Type</option>
     <option>Scholarly Journals</option>
     <option>Academic & Research Sources (Conferences, White Papers)</option>
     <option>Government & International Organizations</option>
     <option>News & Journalism (Newspapers, Magazines, Investigative, Financial)</option>
     <option>Documentary</option>
     <option>Corporate & Marketing Content (Branded Media, Ads)</option>
     <option>Online & User-Generated Content (Blogs, Social Media, Podcasts)</option>
     <option>Legal / Court Documents</option>
     <option>Other</option>
  </select>
  </div>

  <div class="row">
    <label>Field of Publisher</label>
    <select>
    <option>Select Field</option>
    <option>Health & Medical Sciences</option>
    <option>Physical Sciences (Physics, Chemistry)</option>
    <option>Engineering & Technology (Computer Science)</option>
    <option>Social Sciences (Psychology, Economics, Political Science, Anthropology)</option>
    <option>Humanities (History, Philosophy, Literature, Religion)</option>
    <option>Other</option>
    </select>
  </div>
</div>

  
  </div>
  
</div>


<!-- AUTHORS -->
<div class="container">
  <h2>Authors</h2>

  <div id="authors"></div>

  <div class="row author-buttons">
    <label style="visibility:hidden;">x</label>
    <button onclick="addAuthor()">Add Author</button>
    <button onclick="removeAuthor()">Remove Author</button>
  </div>
</div>

  <!-- FULL TEXT -->
<div class="container">
  <h2>Full Article Text</h2> 
  <div class="row full">
    <label>Full Article Text</label>
    <textarea></textarea>
  </div>
</div>

</div>

<script>
let authorCount = 0;

function fieldDropdown() {
  return `
    <select>
      <option>Field of Degree</option>
      <optgroup label="STEM Fields">
        <option>Medical & Health Sciences</option>
        <option>Physics</option>
        <option>Engineering</option>
        <option>Computer Science</option>
      </optgroup>
      <optgroup label="Social Sciences">
        <option>Psychology</option>
        <option>Anthropology</option>
        <option>Economics</option>
        <option>Political Science</option>
      </optgroup>
      <optgroup label="Humanities">
        <option>History, Philosophy, Literature, or Religious Writings</option>
      </optgroup>
    </select>
  `;
}

function degreeDropdown() {
  return `
    <select>
      <option>Highest Degree Earned</option>
      <option>PhD</option>
      <option>Masters</option>
      <option>Bachelors</option>
      <option>High School</option>
      <option>No degree listed</option>
    </select>
  `;
}

function validationDropdown() {
  return `
    <select>
      <option>Validation</option>
      <option>Degree validated at .edu/.gov</option>
      <option>Degree not validated</option>
    </select>
  `;
}

function addAuthor() {
  authorCount++;

  const div = document.createElement('div');
  div.className = 'author-row';

  div.innerHTML = `
    <label>Author ${authorCount}</label>
    <input type="text" placeholder="Name">
    ${degreeDropdown()}
    ${fieldDropdown()}
    ${validationDropdown()}
  `;

  document.getElementById('authors').appendChild(div);
}

function removeAuthor() {
  const container = document.getElementById('authors');
  if (container.children.length > 0) {
    container.removeChild(container.lastChild);
    authorCount--;
  }
}

function toggleDate() {
  const dateInput = document.getElementById('pubDate');
  dateInput.disabled = !dateInput.disabled;
}

addAuthor();
</script>

</body>
</html>
