<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAAP Tester</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Exo+2:wght@500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="main-container">

<h1>CRAAP Tester</h1>

<div class="container">
  <h2>Your Topic</h2>

  <div class="row">
    <label>Keywords</label>
    <input type="text">
  </div>

  <div class="row">
    <label>Keyword Synonyms</label>
    <input type="text">
  </div>

  <div class="row">
    <label>Field of Research</label>
    <select>
      <option>Select Field</option>
      <option>Health & Medical Sciences</option>
      <option>Physical Sciences</option>
      <option>Engineering & Technology</option>
      <option>Social Sciences</option>
      <option>Humanities</option>
      <option>Other</option>
    </select>
  </div>
</div>

<div class="container">
  <h2>Article</h2>

  <div class="row">
    <label>Publication Date</label>
    <input type="date" id="pubDate">
    <label>
      <input type="checkbox" onclick="toggleDate()"> No date
    </label>
  </div>

  <div class="row">
    <label>Purpose</label>
    <select>
      <option>Select Purpose</option>
      <option>Inform</option>
      <option>Persuade</option>
      <option>Entertain</option>
      <option>Profit</option>
    </select>
  </div>
  <div class="row">
    <label>Publication Type</label>
    <select>
      <option>Select Type</option>
      <option>Scholarly Journals</option>
      <option>Research Sources</option>
      <option>Government</option>
      <option>News & Journalism</option>
      <option>Documentary</option>
      <option>Corporate / Marketing</option>
      <option>Online / User Content</option>
      <option>Other</option>
    </select>
  </div>

  <div class="row">
    <label>Field of Publication</label>
    <select>
      <option>Select Field</option>
      <option>Health</option>
      <option>Sciences</option>
      <option>Technology</option>
      <option>Social Sciences</option>
      <option>Humanities</option>
      <option>Other</option>
    </select>
  </div>
</div>

<div class="container">
  <h2>Authors</h2>

  <div id="authors"></div>

  <button type="button" onclick="addAuthor()">Add Author</button>
  <button type="button" onclick="removeAuthor()">Remove Author</button>
</div>

</div>

<script>
let authorCount = 0;

function addAuthor() {
  authorCount++;

  const div = document.createElement('div');

  div.innerHTML = `
    <label>Author ${authorCount}</label>
    <input type="text" placeholder="Name">
  `;

  document.getElementById('authors').appendChild(div);
}

function removeAuthor() {
  const container = document.getElementById('authors');
  if (container.children.length > 0) {
    container.removeChild(container.lastChild);
  }
}

function toggleDate() {
  const dateInput = document.getElementById('pubDate');
  dateInput.disabled = !dateInput.disabled;
}

addAuthor();
</script>

</body>
</html>
