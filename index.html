<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAAP Tester</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Exo+2:wght@500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="main-container">

  
<!-- TITLE OF PAGE-->
<h1>CRAAP Tester</h1>


  
<!-- CONTAINER ONE -->
<div class="container">
  <h2>Research Topic</h2>

 <!-- KEYWORDS -->
  <div class="row">
    <label>Keywords</label>
    <input type="text">
  </div>

  <!-- SYNONYMS -->
  <div class="row">
    <label>Keyword Synonyms</label>
    <input type="text">
  </div>

  <!-- TOPIC FIELD -->
  <div class="row">
    <label>Field</label>
    <select>
      <option>Select Field</option>
      <option>Health & Medical Sciences</option>
      <option>Physical Sciences (Physics, Chemistry)</option>
      <option>Engineering & Technology (Computer Science)</option>
      <option>Social Sciences (Psychology, Economics, Political Science, Anthropology)</option>
      <option>Humanities (History, Philosophy, Literature, Religion)</option>
      <option>Other</option>
    </select>
  </div>
  
</div>
<!-- END OF CONTAINER ONE-->

  
<!-- CONTAINER TWO -->
<div class="container">
  <h2>Article</h2>

  <!-- PUBLICATION DATE -->
  <div class="row date-row">
    <label>Publication Date</label>
    <input type="date" id="pubDate">
    <label class="checkbox-label">
      <input type="checkbox" onclick="toggleDate()"> No date provided
    </label>
  </div>

  <!-- PUBLISHER NAME -->

  <div class="row">
  <label>Publisher Name</label>
  <input type="text" class="publisher-input">
  </div>

  <!-- PUBLISHER TYPE -->
  <div class="row">
  <label>Publication Type</label>
  <select>
    <option>Select Publication Type</option>
     <option>Scholarly Journals</option>
     <option>Academic & Research Sources (Conferences, White Papers)</option>
     <option>Government & International Organizations</option>
     <option>News & Journalism (Newspapers, Magazines, Investigative, Financial)</option>
     <option>Documentary</option>
     <option>Corporate & Marketing Content (Branded Media, Ads)</option>
     <option>Online & User-Generated Content (Blogs, Social Media, Podcasts)</option>
     <option>Legal / Court Documents</option>
     <option>Other</option>
  </select>
  </div>

  <div class="row">
    <label>Field of Publisher</label>
    <select>
    <option>Select Field</option>
    <option>Health & Medical Sciences</option>
    <option>Physical Sciences (Physics, Chemistry)</option>
    <option>Engineering & Technology (Computer Science)</option>
    <option>Social Sciences (Psychology, Economics, Political Science, Anthropology)</option>
    <option>Humanities (History, Philosophy, Literature, Religion)</option>
    <option>Other</option>
    </select>
  </div>

<div class="row full">
  <label>Select all that apply:</label>
  <div class="checkbox-group">
    <label><input type="checkbox"> Advertising present</label>
    <label><input type="checkbox"> Sponsored content</label>
    <label><input type="checkbox"> Promotes a product or agenda</label>
    <label><input type="checkbox"> Emotional or persuasive language</label>
    <label><input type="checkbox"> One-sided argument</label>
  </div>
</div>
  
<!-- AUTHORS -->
<div class="container">
  <h2>Authors</h2>

  <div id="authors"></div>

  <div class="author-buttons">
    <button type="button" onclick="addAuthor()">Add Author</button>
    <button type="button" onclick="removeAuthor()">Remove Author</button>
  </div>
</div>
  
  <!-- FULL TEXT -->
<div class="container">
  <h2>Full Article Text</h2> 
  <div class="row full">
    <textarea></textarea>
  </div>
</div>

</div>
</div>
<script>

let authorCount = 0;

/* DEGREE DROPDOWN */
function degreeDropdown() {
  return `
    <select>
      <option>Highest Degree</option>
      <option>PhD</option>
      <option>Masters</option>
      <option>Bachelors</option>
      <option>High School</option>
      <option>No degree listed</option>
    </select>
  `;
}

/* FIELD DROPDOWN */
function fieldSelect() {
  return `
    <select>
      <option>Select Field</option>
      <option>Health & Medical Sciences</option>
      <option>Physical Sciences</option>
      <option>Engineering & Technology</option>
      <option>Social Sciences</option>
      <option>Humanities</option>
      <option>Other</option>
    </select>
  `;
}

/* ADD AUTHOR */
function addAuthor() {
  authorCount++;

  const div = document.createElement('div');
  div.className = 'author-row';

  div.innerHTML = `
    <label>Author ${authorCount}</label>
    <input type="text" placeholder="Name">
    ${degreeDropdown()}
    ${fieldSelect()}
  `;

  document.getElementById('authors').appendChild(div);
}

/* REMOVE AUTHOR */
function removeAuthor() {
  const container = document.getElementById('authors');
  if (container.children.length > 0) {
    container.removeChild(container.lastChild);
    authorCount--;
  }
}

/* START WITH ONE AUTHOR */
addAuthor();

</script>
